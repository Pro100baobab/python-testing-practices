<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог рыбы</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #2c3e50; }
        .product-list { list-style: none; padding: 0; }
        .product-list li { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .product-list a { text-decoration: none; font-size: 18px; color: #2980b9; }
        .product-list a:hover { text-decoration: underline; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{% url 'catalog:product_list' %}">Главная</a>
        <a href="{% url 'catalog:about' %}">О сервисе</a>
    </div>
    <h1>Наша рыба</h1>
    <ul class="product-list">
        {% for product in products %}
            <li>
                <a href="{% url 'catalog:product_detail' product.pk %}">{{ product.name }}</a>
                ({{ product.get_kind_display }}, {{ product.weight_grams }} г)
            </li>
        {% empty %}
            <li>Товаров пока нет.</li>
        {% endfor %}
    </ul>
</body>
</html>
